name: Build and Push Multi-Images to Harbor

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    environment: harbor
    env:
      HARBOR_REGISTRY: 100.87.103.100:8000
      HARBOR_PROJECT: docbot
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.HARBOR_REGISTRY }} \
          -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build all images
        run: |
          # Dùng docker-compose để build tất cả các service có khai báo 'build'
          # backend, worker, frontend sẽ được build đồng thời
          docker compose build

      - name: Tag and Push Images
        run: |
          # Danh sách các service cần push (tên khớp với trong docker-compose.yml)
          SERVICES=("backend" "worker" "frontend")
          
          for SERVICE in "${SERVICES[@]}"; do
            IMAGE_FULL_PATH="${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/docbot-${SERVICE}"
            
            # Lấy ID của image vừa build xong
            # Lưu ý: docker-compose build mặc định tạo tag tên thư mục_service
            # Ví dụ: docbot_backend
            LOCAL_IMAGE=$(docker images --format "{{.Repository}}" | grep ${SERVICE} | head -n 1)
            
            # Tag với SHA và latest
            docker tag $LOCAL_IMAGE:latest ${IMAGE_FULL_PATH}:${{ env.TAG }}
            docker tag $LOCAL_IMAGE:latest ${IMAGE_FULL_PATH}:latest
            
            # Push
            docker push ${IMAGE_FULL_PATH}:${{ env.TAG }}
            docker push ${IMAGE_FULL_PATH}:latest
            
            echo "Successfully pushed ${SERVICE}"
          done

      - name: Clean up
        if: always()
        run: |
          docker image prune -f
