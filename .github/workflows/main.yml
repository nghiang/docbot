name: Build and Push to Harbor

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    # Phải khớp với label lúc bạn cấu hình Runner trên Mac
    runs-on: self-hosted 

    env:
      # Địa chỉ Harbor của bạn (không bao gồm http:// khi login/tag)
      HARBOR_REGISTRY: 100.87.103.100:8000
      # Project ID hoặc Name (thường là tên project, ví dụ: 'docbot' hoặc 'library')
      # Bạn hãy kiểm tra tên project trong Harbor tương ứng với ID 2
      HARBOR_PROJECT: docbot 
      IMAGE_NAME: docbot-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        # Sử dụng --password-stdin để bảo mật mật khẩu
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.HARBOR_REGISTRY }} \
          -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          # Tag image theo cấu trúc: registry/project/image:tag
          docker build -t ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          # Gắn thêm tag latest
          docker tag ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Image to Harbor
        run: |
          docker push ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest

      - name: Clean up
        if: always()
        run: |
          docker rmi ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker rmi ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest
