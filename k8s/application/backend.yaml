apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: docbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: backend
          image: 100.87.103.100:8000/docbot/docbot-backend:latest
          imagePullPolicy: Always
          command:
            - uvicorn
            - main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --root-path
            - /api
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: docbot-config
            - secretRef:
                name: docbot-secret
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: docbot
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
