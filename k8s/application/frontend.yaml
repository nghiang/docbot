apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: docbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: frontend
          image: 100.87.103.100:8000/docbot/docbot-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: docbot
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
